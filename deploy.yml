# .github/workflows/deploy.yml
# Auto-deploy to Hugging Face Spaces on every push to main.
#
# Required GitHub Secrets:
#   HF_TOKEN      — Hugging Face write access token
#   HF_USERNAME   — Your Hugging Face username
#   HF_SPACE_NAME — Your Space name (e.g. fake-news-detector)
#
# AI Fake News Detection & Live Verification System — Version 3
# Government Polytechnic West Champaran — AI & ML Internship 2026
# Developed by: Naman Kumar & Parmeshwar

name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Push to HF Spaces
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip packages
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Verify all imports work before training or deploying
      - name: Verify Imports
        run: |
          python -c "
          import sklearn, numpy, pandas
          from sklearn.svm import LinearSVC
          from sklearn.naive_bayes import MultinomialNB
          from sklearn.linear_model import PassiveAggressiveClassifier, LogisticRegression
          from sklearn.calibration import CalibratedClassifierCV
          import utils, search, fact_checker, train_model
          from utils import clean_text, predict_ml, make_final_decision, extract_primary_claim
          from search import search_multiple_queries, analyze_search_results, extract_article_text
          from fact_checker import check_news
          print('All V3 imports OK')
          "

      # 6. Train model — generates model.pkl, vectorizer.pkl, model_name.txt, model_metrics.txt
      - name: Train Model (Multi-Model Selection)
        run: python train_model.py

      # 7. Install huggingface_hub
      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.22.0,<2.0.0"

      # 8. Push to Hugging Face Spaces
      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          python - <<'PYSCRIPT'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          token      = os.environ["HF_TOKEN"]
          username   = os.environ["HF_USERNAME"]
          space_name = os.environ["HF_SPACE_NAME"]
          repo_id    = f"{username}/{space_name}"

          files_to_upload = [
              "app.py",
              "fact_checker.py",
              "search.py",
              "utils.py",
              "train_model.py",
              "dataset.csv",
              "model.pkl",
              "vectorizer.pkl",
              "model_name.txt",
              "model_metrics.txt",
              "requirements.txt",
              "README.md",
              "LICENSE",
          ]

          uploaded, skipped = 0, 0
          for filepath in files_to_upload:
              if os.path.exists(filepath):
                  api.upload_file(
                      path_or_fileobj=filepath,
                      path_in_repo=filepath,
                      repo_id=repo_id,
                      repo_type="space",
                      token=token,
                  )
                  print(f"Uploaded: {filepath}")
                  uploaded += 1
              else:
                  print(f"Skipped (not found): {filepath}")
                  skipped += 1

          print(f"Deployment complete — {uploaded} uploaded, {skipped} skipped.")
          PYSCRIPT

      # 9. Summary
      - name: Deployment Summary
        run: |
          echo "✅ Deployed V3 to Hugging Face Spaces"
          echo "🌐 https://huggingface.co/spaces/${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }}"
